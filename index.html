<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>飞书机构分布地图插件</title>
    <meta name="description" content="飞书插件 - 基于多维表格数据的机构分布地图可视化" />
  </head>
  <body>
    <div id="root"></div>
    <!-- 尝试多个CDN源加载ECharts -->
    <script>
      window.echartsLoaded = false;
      window.echartsLoadPromise = new Promise((resolve, reject) => {
        const cdnSources = [
          'https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js',
          'https://unpkg.com/echarts@5.4.3/dist/echarts.min.js',
          'https://cdnjs.cloudflare.com/ajax/libs/echarts/5.4.3/echarts.min.js'
        ];
        
        let currentIndex = 0;
        
        function tryLoadECharts() {
          if (currentIndex >= cdnSources.length) {
            reject(new Error('所有CDN源都无法加载ECharts库'));
            return;
          }
          
          const script = document.createElement('script');
          script.src = cdnSources[currentIndex];
          script.onload = () => {
            console.log(`ECharts 库从 ${cdnSources[currentIndex]} 加载成功`);
            window.echartsLoaded = true;
            resolve();
          };
          script.onerror = () => {
            console.warn(`从 ${cdnSources[currentIndex]} 加载ECharts失败，尝试下一个源`);
            currentIndex++;
            tryLoadECharts();
          };
          document.head.appendChild(script);
        }
        
        tryLoadECharts();
      });
    </script>
    <script type="module" src="/main.js"></script>
  </body>
</html>
