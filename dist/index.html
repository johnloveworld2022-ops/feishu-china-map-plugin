    <!-- 一定要放在所有模块脚本之前，让 TS/JS 里可以调用 fetch_disabled() -->
    <script>
      // 作为全局函数暴露：返回 true 表示“禁用在线拉取，用本地数据”
      window.fetch_disabled = function () { return true; };
    </script>

    <meta charset="UTF-8" />

    <!-- 构建产物（按你 dist 里的文件名保持不变） -->
    <script type="module" crossorigin src="./assets/index-09ce1108.js"></script>
    <link rel="modulepreload" crossorigin href="./assets/vendor-57209f9c.js">
    <link rel="modulepreload" crossorigin href="./assets/echarts-9fe7269c.js">
    <link rel="stylesheet" href="./assets/index-4ed0f864.css">

    <!-- 没有 hash 时自动跳到 #/，避免路由 404 -->
    <script>
      (function ensureHashEntry() {
        try {
          if (!location.hash) {
            var p = location.pathname.replace(/\/+/g, "/");
            if (p.endsWith("/") || p.endsWith("/index.html")) {
              location.replace(location.origin + location.pathname + location.search + "#/");
            }
          }
        } catch (e) {}
      })();
    </script>
  </head>
